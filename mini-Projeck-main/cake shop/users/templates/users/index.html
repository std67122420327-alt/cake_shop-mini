{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <!-- Hero Section for Logged-in Users -->
  <div class="food-hero">
    <div class="container text-center">
      <h1>🎉 ยินดีต้อนรับกลับมา! 🎉</h1>
      <p>พร้อมสั่งอาหารอร่อยๆ แล้วหรือยัง?</p>
    </div>
  </div>
  
  <div class="container mt-4">
    <div class="row g-4">
      <div class="col-md-4">
        <a href="{{ url_for('core.index') }}" style="text-decoration: none;">
          <div class="card dashboard-card text-center" style="border: none; border-radius: 25px; padding: 40px; background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%); color: white; box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);">
            <i class="bi bi-house-door" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 700;">หน้าแรก</h3>
            <p>ดูเมนูอาหารทั้งหมด</p>
          </div>
        </a>
      </div>
      
      <div class="col-md-4">
        <a href="{{ url_for('food.index') }}" style="text-decoration: none;">
          <div class="card dashboard-card text-center" style="border: none; border-radius: 25px; padding: 40px; background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%); color: white; box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);">
            <i class="bi bi-list-stars" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 700;">จัดการเมนู</h3>
            <p>เพิ่ม/แก้ไข/ลบเมนูอาหาร</p>
          </div>
        </a>
      </div>
      
      <div class="col-md-4">
        <a href="{{ url_for('users.profile') }}" style="text-decoration: none;">
          <div class="card dashboard-card text-center" style="border: none; border-radius: 25px; padding: 40px; background: linear-gradient(135deg, #9C27B0 0%, #BA68C8 100%); color: white; box-shadow: 0 10px 30px rgba(156, 39, 176, 0.3);">
            <i class="bi bi-person-circle" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 700;">โปรไฟล์</h3>
            <p>ดูและแก้ไขข้อมูลส่วนตัว</p>
          </div>
        </a>
      </div>
    </div>
  </div>
{% endblock %}
