{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card" style="border: none; border-radius: 25px; padding: 40px; background: white; box-shadow: 0 15px 40px rgba(0,0,0,0.1);">
          <div class="text-center mb-4">
            <div style="font-size: 4rem; background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
              <i class="bi bi-shield-lock"></i>
            </div>
            <h2 class="section-title">{{title}}</h2>
          </div>
          <form method="post">
            <div class="mb-4">
              <label for="old_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-lock"></i> Old Password
              </label>
              <input name="old_password" type="password" class="form-control" id="old_password" required style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>
            <div class="mb-4">
              <label for="new_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-key"></i> New Password
              </label>
              <input name="new_password" type="password" class="form-control" id="new_password" required style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>
            <div class="mb-4">
              <label for="confirm_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-check2-circle"></i> Confirm Password
              </label>
              <input name="confirm_password" type="password" class="form-control" id="confirm_password" required style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>
            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%); color: white; border: none; border-radius: 15px; padding: 12px; font-weight: 700;">
              <i class="bi bi-check-circle"></i>
              Change Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
